<svg width="700" viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-family:-apple-system,sans-serif;font-size:14px;font-weight:500;}
    .ts{font-family:-apple-system,sans-serif;font-size:12px;}
    .c-blue  rect{fill:#e6f1fb;stroke:#185fa5;stroke-width:0.5;} .c-blue  .th{fill:#0c447c;} .c-blue  .ts{fill:#185fa5;}
    .c-amber rect{fill:#faeeda;stroke:#854f0b;stroke-width:0.5;} .c-amber .th{fill:#633806;} .c-amber .ts{fill:#854f0b;}
    .c-teal  rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5;} .c-teal  .th{fill:#085041;} .c-teal  .ts{fill:#0f6e56;}
    .c-gray  rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5;} .c-gray  .th{fill:#2c2c2a;} .c-gray  .ts{fill:#5f5e5a;}
  </style>
</defs>
<g class="c-blue"><rect x="20" y="20" width="188" height="56" rx="8"/>
<text class="th" x="114" y="40" text-anchor="middle" dominant-baseline="central">Double tap</text>
<text class="ts" x="114" y="58" text-anchor="middle" dominant-baseline="central">2 taps &#xB7; 320ms window &#xB7; any point</text></g>
<g class="c-teal"><rect x="228" y="33" width="110" height="30" rx="6"/>
<text class="th" x="283" y="48" text-anchor="middle" dominant-baseline="central">Scan</text></g>
<line x1="208" y1="48" x2="226" y2="48" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-blue"><rect x="360" y="20" width="188" height="56" rx="8"/>
<text class="th" x="454" y="40" text-anchor="middle" dominant-baseline="central">Long press</text>
<text class="ts" x="454" y="58" text-anchor="middle" dominant-baseline="central">Hold &#x2265;700ms &#xB7; no movement</text></g>
<g class="c-teal"><rect x="558" y="33" width="100" height="30" rx="6"/>
<text class="th" x="608" y="48" text-anchor="middle" dominant-baseline="central">Repeat</text></g>
<line x1="548" y1="48" x2="556" y2="48" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-amber"><rect x="20" y="110" width="188" height="56" rx="8"/>
<text class="th" x="114" y="130" text-anchor="middle" dominant-baseline="central">Swipe left / right</text>
<text class="ts" x="114" y="148" text-anchor="middle" dominant-baseline="central">&#x2265;60px &#xB7; ratio 1.2:1 horiz</text></g>
<g class="c-teal"><rect x="228" y="123" width="110" height="30" rx="6"/>
<text class="th" x="283" y="138" text-anchor="middle" dominant-baseline="central">Change mode</text></g>
<line x1="208" y1="138" x2="226" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-amber"><rect x="360" y="110" width="188" height="56" rx="8"/>
<text class="th" x="454" y="130" text-anchor="middle" dominant-baseline="central">Triple tap</text>
<text class="ts" x="454" y="148" text-anchor="middle" dominant-baseline="central">3 taps &#xB7; 500ms window</text></g>
<g class="c-teal"><rect x="558" y="123" width="100" height="30" rx="6"/>
<text class="th" x="608" y="138" text-anchor="middle" dominant-baseline="central">Settings</text></g>
<line x1="548" y1="138" x2="556" y2="138" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-teal"><rect x="20" y="200" width="188" height="56" rx="8"/>
<text class="th" x="114" y="220" text-anchor="middle" dominant-baseline="central">Swipe up</text>
<text class="ts" x="114" y="238" text-anchor="middle" dominant-baseline="central">&#x2265;80px &#xB7; ratio 1.3:1 vert</text></g>
<g class="c-teal"><rect x="228" y="213" width="110" height="30" rx="6"/>
<text class="th" x="283" y="228" text-anchor="middle" dominant-baseline="central">Watch Mode</text></g>
<line x1="208" y1="228" x2="226" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-gray"><rect x="360" y="200" width="188" height="56" rx="8"/>
<text class="th" x="454" y="220" text-anchor="middle" dominant-baseline="central">Single tap</text>
<text class="ts" x="454" y="238" text-anchor="middle" dominant-baseline="central">Intentionally ignored</text></g>
<g class="c-gray"><rect x="558" y="213" width="100" height="30" rx="6"/>
<text class="th" x="608" y="228" text-anchor="middle" dominant-baseline="central">No action</text></g>
<line x1="548" y1="228" x2="556" y2="228" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="340" y="284" text-anchor="middle">Figure 3.5 &#x2014; Gesture vocabulary: six gestures, recognition thresholds, and resulting actions</text>
</svg>