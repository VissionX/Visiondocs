<svg width="700" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:14px; font-weight:500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:12px; }
    .c-gray rect  { fill:#f1efe8; stroke:#5f5e5a; stroke-width:0.5; }
    .c-blue rect  { fill:#e6f1fb; stroke:#185fa5; stroke-width:0.5; }
    .c-teal rect  { fill:#e1f5ee; stroke:#0f6e56; stroke-width:0.5; }
    .c-gray  .th  { fill:#2c2c2a; } .c-gray  .ts { fill:#5f5e5a; }
    .c-blue  .th  { fill:#0c447c; } .c-blue  .ts { fill:#185fa5; }
    .c-teal  .th  { fill:#085041; } .c-teal  .ts { fill:#0f6e56; }
  </style>
</defs>

<g class="c-gray">
  <rect x="20" y="58" width="110" height="60" rx="6"/>
  <text class="th" x="75" y="82" text-anchor="middle" dominant-baseline="central">Text input</text>
  <text class="ts" x="75" y="100" text-anchor="middle" dominant-baseline="central">AI description</text>
</g>
<line x1="130" y1="88" x2="150" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-blue">
  <rect x="152" y="50" width="120" height="76" rx="6"/>
  <text class="th" x="212" y="76" text-anchor="middle" dominant-baseline="central">useVoice queue</text>
  <text class="ts" x="212" y="94" text-anchor="middle" dominant-baseline="central">Priority: high/normal</text>
  <text class="ts" x="212" y="110" text-anchor="middle" dominant-baseline="central">FIFO · genRef guard</text>
</g>
<line x1="272" y1="88" x2="292" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-teal">
  <rect x="294" y="58" width="120" height="60" rx="6"/>
  <text class="th" x="354" y="78" text-anchor="middle" dominant-baseline="central">expo-speech</text>
  <text class="ts" x="354" y="96" text-anchor="middle" dominant-baseline="central">Speech.speak()</text>
  <text class="ts" x="354" y="111" text-anchor="middle" dominant-baseline="central">Speech.stop()</text>
</g>
<line x1="414" y1="88" x2="434" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-blue">
  <rect x="436" y="50" width="120" height="76" rx="6"/>
  <text class="th" x="496" y="76" text-anchor="middle" dominant-baseline="central">Android TTS</text>
  <text class="ts" x="496" y="94" text-anchor="middle" dominant-baseline="central">en-US / ar-SA</text>
  <text class="ts" x="496" y="110" text-anchor="middle" dominant-baseline="central">rate 0.88 / 0.82</text>
</g>
<line x1="556" y1="88" x2="576" y2="88" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-teal">
  <rect x="578" y="62" width="82" height="52" rx="6"/>
  <text class="th" x="619" y="82" text-anchor="middle" dominant-baseline="central">Speaker</text>
  <text class="ts" x="619" y="100" text-anchor="middle" dominant-baseline="central">Audio out</text>
</g>

<text class="ts" x="340" y="172" text-anchor="middle" fill="#5f5e5a">Figure 2.4 — TTS pipeline: AI text → useVoice queue → expo-speech → Android TTS engine → audio</text>
</svg>
