<svg width="700" viewBox="0 0 680 420" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;}
    .ts{font-family:-apple-system,sans-serif;font-size:12px;}
    .c-gray  rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5;} .c-gray  .th{fill:#2c2c2a;}
    .c-blue  rect{fill:#e6f1fb;stroke:#185fa5;stroke-width:0.5;} .c-blue  .th{fill:#0c447c;}
    .c-teal  rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5;} .c-teal  .th{fill:#085041;}
    .c-amber rect{fill:#faeeda;stroke:#854f0b;stroke-width:0.5;} .c-amber .th{fill:#633806;}
    .c-coral rect{fill:#faece7;stroke:#993c1d;stroke-width:0.5;} .c-coral .th{fill:#712b13;}
  </style>
</defs>
<g class="c-gray"><rect x="28" y="14" width="70" height="30" rx="4"/>
<text class="th" x="63" y="29" text-anchor="middle" dominant-baseline="central">User</text></g>
<g class="c-blue"><rect x="148" y="14" width="90" height="30" rx="4"/>
<text class="th" x="193" y="29" text-anchor="middle" dominant-baseline="central">Gestures</text></g>
<g class="c-teal"><rect x="278" y="14" width="90" height="30" rx="4"/>
<text class="th" x="323" y="29" text-anchor="middle" dominant-baseline="central">App.js FSM</text></g>
<g class="c-amber"><rect x="408" y="14" width="90" height="30" rx="4"/>
<text class="th" x="453" y="29" text-anchor="middle" dominant-baseline="central">Detection</text></g>
<g class="c-coral"><rect x="544" y="14" width="100" height="30" rx="4"/>
<text class="th" x="594" y="29" text-anchor="middle" dominant-baseline="central">Voice output</text></g>
<line x1="63"  y1="44" x2="63"  y2="400" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="193" y1="44" x2="193" y2="400" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="323" y1="44" x2="323" y2="400" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="453" y1="44" x2="453" y2="400" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="594" y1="44" x2="594" y2="400" stroke="#c8c6be" stroke-width="0.5" stroke-dasharray="4 3"/>
<line x1="63"  y1="70" x2="191" y2="70" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="128" y="64" text-anchor="middle" fill="#185fa5">double tap</text>
<line x1="193" y1="95" x2="321" y2="95" stroke="#185fa5" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="257" y="89" text-anchor="middle" fill="#185fa5">onScan()</text>
<line x1="323" y1="118" x2="592" y2="118" stroke="#0f6e56" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="457" y="112" text-anchor="middle" fill="#0f6e56">speak("Scanning.", high)</text>
<line x1="323" y1="144" x2="451" y2="144" stroke="#854f0b" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="387" y="138" text-anchor="middle" fill="#854f0b">detect(frame, mode)</text>
<text class="ts" x="370" y="162" text-anchor="start" fill="#888780">STATE &#x2192; SCANNING</text>
<text class="ts" x="370" y="190" text-anchor="start" fill="#888780">Gemini API / ML Kit (12s timeout)</text>
<line x1="453" y1="240" x2="321" y2="240" stroke="#854f0b" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text class="ts" x="387" y="234" text-anchor="middle" fill="#854f0b">{result, source}</text>
<text class="ts" x="370" y="258" text-anchor="start" fill="#888780">STATE &#x2192; SPEAKING</text>
<line x1="323" y1="288" x2="592" y2="288" stroke="#0f6e56" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="457" y="282" text-anchor="middle" fill="#0f6e56">speak(result, high)</text>
<line x1="594" y1="310" x2="321" y2="310" stroke="#993c1d" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text class="ts" x="457" y="304" text-anchor="middle" fill="#993c1d">onDone callback</text>
<text class="ts" x="370" y="328" text-anchor="start" fill="#888780">STATE &#x2192; READY (after delay)</text>
<line x1="323" y1="356" x2="61" y2="356" stroke="#888780" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arr)"/>
<text class="ts" x="192" y="350" text-anchor="middle" fill="#888780">spoken description</text>
<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="340" y="408" text-anchor="middle">Figure 3.4 &#x2014; Sequence diagram: complete scan flow from gesture to voice output</text>
</svg>