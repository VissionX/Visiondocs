<svg width="700" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:14px; font-weight:500; fill:#1a1a18; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:12px; fill:#5f5e5a; }
    .c-gray rect  { fill:#f1efe8; stroke:#5f5e5a; stroke-width:0.5; }
    .c-blue rect  { fill:#e6f1fb; stroke:#185fa5; stroke-width:0.5; }
    .c-teal rect  { fill:#e1f5ee; stroke:#0f6e56; stroke-width:0.5; }
    .c-gray  .th  { fill:#2c2c2a; } .c-gray  .ts { fill:#5f5e5a; }
    .c-blue  .th  { fill:#0c447c; } .c-blue  .ts { fill:#185fa5; }
    .c-teal  .th  { fill:#085041; } .c-teal  .ts { fill:#0f6e56; }
  </style>
</defs>

<g class="c-gray">
  <rect x="265" y="20" width="150" height="40" rx="6"/>
  <text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">Input (narrow channels)</text>
</g>

<line x1="340" y1="60" x2="340" y2="80" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-blue">
  <rect x="230" y="80" width="220" height="50" rx="6"/>
  <text class="th" x="340" y="100" text-anchor="middle" dominant-baseline="central">1×1 Conv — expand</text>
  <text class="ts" x="340" y="118" text-anchor="middle" dominant-baseline="central">×6 channel expansion · ReLU6</text>
</g>

<line x1="340" y1="130" x2="340" y2="150" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-teal">
  <rect x="230" y="150" width="220" height="50" rx="6"/>
  <text class="th" x="340" y="170" text-anchor="middle" dominant-baseline="central">3×3 Depthwise Conv</text>
  <text class="ts" x="340" y="188" text-anchor="middle" dominant-baseline="central">One filter per channel · ReLU6</text>
</g>

<line x1="340" y1="200" x2="340" y2="220" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-blue">
  <rect x="230" y="220" width="220" height="50" rx="6"/>
  <text class="th" x="340" y="240" text-anchor="middle" dominant-baseline="central">1×1 Conv — project</text>
  <text class="ts" x="340" y="258" text-anchor="middle" dominant-baseline="central">Compress back · linear (no ReLU)</text>
</g>

<line x1="340" y1="270" x2="340" y2="290" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<g class="c-gray">
  <rect x="265" y="290" width="150" height="20" rx="4"/>
  <text class="th" x="340" y="300" text-anchor="middle" dominant-baseline="central">Output (narrow channels)</text>
</g>

<!-- Skip connection -->
<path d="M265 40 L140 40 L140 300 L265 300" fill="none" stroke="#888780" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr)"/>
<text class="ts" x="112" y="175" text-anchor="middle">Residual</text>
<text class="ts" x="112" y="190" text-anchor="middle">skip</text>

<text class="ts" x="468" y="105" text-anchor="start">Bottleneck expands</text>
<text class="ts" x="468" y="175" text-anchor="start">Spatial features</text>
<text class="ts" x="468" y="245" text-anchor="start">Linear, preserves info</text>
</svg>
