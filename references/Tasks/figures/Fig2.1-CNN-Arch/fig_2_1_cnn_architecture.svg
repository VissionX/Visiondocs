<svg width="700" viewBox="0 0 680 260" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:14px; font-weight:500; fill:#1a1a18; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:12px; fill:#5f5e5a; }
    .c-gray rect  { fill:#f1efe8; stroke:#5f5e5a; stroke-width:0.5; }
    .c-blue rect  { fill:#e6f1fb; stroke:#185fa5; stroke-width:0.5; }
    .c-teal rect  { fill:#e1f5ee; stroke:#0f6e56; stroke-width:0.5; }
    .c-amber rect { fill:#faeeda; stroke:#854f0b; stroke-width:0.5; }
    .c-gray  .th  { fill:#2c2c2a; } .c-gray  .ts { fill:#5f5e5a; }
    .c-blue  .th  { fill:#0c447c; } .c-blue  .ts { fill:#185fa5; }
    .c-teal  .th  { fill:#085041; } .c-teal  .ts { fill:#0f6e56; }
    .c-amber .th  { fill:#633806; } .c-amber .ts { fill:#854f0b; }
  </style>
</defs>

<g class="c-gray">
  <rect x="20" y="90" width="70" height="80" rx="6"/>
  <text class="th" x="55" y="122" text-anchor="middle" dominant-baseline="central">Input</text>
  <text class="ts" x="55" y="140" text-anchor="middle" dominant-baseline="central">224×224</text>
  <text class="ts" x="55" y="155" text-anchor="middle" dominant-baseline="central">RGB</text>
</g>

<g class="c-blue">
  <rect x="120" y="70" width="88" height="120" rx="6"/>
  <text class="th" x="164" y="112" text-anchor="middle" dominant-baseline="central">Conv</text>
  <text class="ts" x="164" y="130" text-anchor="middle" dominant-baseline="central">32 filters</text>
  <text class="ts" x="164" y="146" text-anchor="middle" dominant-baseline="central">3×3 · ReLU</text>
</g>

<g class="c-teal">
  <rect x="234" y="85" width="76" height="90" rx="6"/>
  <text class="th" x="272" y="121" text-anchor="middle" dominant-baseline="central">Pool</text>
  <text class="ts" x="272" y="139" text-anchor="middle" dominant-baseline="central">Max 2×2</text>
  <text class="ts" x="272" y="155" text-anchor="middle" dominant-baseline="central">÷2 spatial</text>
</g>

<g class="c-blue">
  <rect x="336" y="80" width="88" height="100" rx="6"/>
  <text class="th" x="380" y="120" text-anchor="middle" dominant-baseline="central">Conv</text>
  <text class="ts" x="380" y="138" text-anchor="middle" dominant-baseline="central">64 filters</text>
  <text class="ts" x="380" y="154" text-anchor="middle" dominant-baseline="central">3×3 · ReLU</text>
</g>

<g class="c-amber">
  <rect x="450" y="90" width="88" height="80" rx="6"/>
  <text class="th" x="494" y="120" text-anchor="middle" dominant-baseline="central">FC Layer</text>
  <text class="ts" x="494" y="138" text-anchor="middle" dominant-baseline="central">Flatten</text>
  <text class="ts" x="494" y="153" text-anchor="middle" dominant-baseline="central">+ Dense</text>
</g>

<g class="c-teal">
  <rect x="564" y="100" width="80" height="60" rx="6"/>
  <text class="th" x="604" y="124" text-anchor="middle" dominant-baseline="central">Output</text>
  <text class="ts" x="604" y="142" text-anchor="middle" dominant-baseline="central">Softmax</text>
</g>

<line x1="90"  y1="130" x2="118" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="208" y1="130" x2="232" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="310" y1="130" x2="334" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="424" y1="130" x2="448" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="538" y1="130" x2="562" y2="130" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

<text class="ts" x="164" y="48" text-anchor="middle">Feature maps</text>
<text class="ts" x="272" y="48" text-anchor="middle">Downsampled</text>
<text class="ts" x="380" y="48" text-anchor="middle">Deep features</text>
<text class="ts" x="494" y="48" text-anchor="middle">Classification</text>

<text class="ts" x="340" y="240" text-anchor="middle">Figure 2.1 — Convolutional Neural Network architecture for image feature extraction</text>
</svg>
