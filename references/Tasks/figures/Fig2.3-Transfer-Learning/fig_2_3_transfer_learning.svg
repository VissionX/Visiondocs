<svg width="700" viewBox="0 0 680 240" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:14px; font-weight:500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:12px; }
    .c-gray rect  { fill:#f1efe8; stroke:#5f5e5a; stroke-width:0.5; }
    .c-blue rect  { fill:#e6f1fb; stroke:#185fa5; stroke-width:0.5; }
    .c-teal rect  { fill:#e1f5ee; stroke:#0f6e56; stroke-width:0.5; }
    .c-gray  .th  { fill:#2c2c2a; } .c-gray  .ts { fill:#5f5e5a; }
    .c-blue  .th  { fill:#0c447c; } .c-blue  .ts { fill:#185fa5; }
    .c-teal  .th  { fill:#085041; } .c-teal  .ts { fill:#0f6e56; }
  </style>
</defs>

<g class="c-gray">
  <rect x="30" y="40" width="150" height="120" rx="8"/>
  <text class="th" x="105" y="72" text-anchor="middle" dominant-baseline="central">MobileNetV2</text>
  <text class="ts" x="105" y="90" text-anchor="middle" dominant-baseline="central">ImageNet pretrained</text>
  <text class="ts" x="105" y="110" text-anchor="middle" dominant-baseline="central">1,000 classes</text>
  <text class="ts" x="105" y="128" text-anchor="middle" dominant-baseline="central">1.2M images</text>
</g>

<line x1="182" y1="100" x2="238" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="210" y="90" text-anchor="middle" fill="#5f5e5a">freeze</text>
<text class="ts" x="210" y="113" text-anchor="middle" fill="#5f5e5a">weights</text>

<g class="c-blue">
  <rect x="240" y="40" width="160" height="120" rx="8"/>
  <text class="th" x="320" y="65" text-anchor="middle" dominant-baseline="central">Frozen base</text>
  <text class="ts" x="320" y="83" text-anchor="middle" dominant-baseline="central">Conv feature extractor</text>
  <text class="ts" x="320" y="101" text-anchor="middle" dominant-baseline="central">Weights locked</text>
  <text class="ts" x="320" y="119" text-anchor="middle" dominant-baseline="central">No gradient update</text>
  <text class="ts" x="320" y="137" text-anchor="middle" dominant-baseline="central">during Phase 1</text>
</g>

<line x1="402" y1="100" x2="440" y2="100" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="421" y="90" text-anchor="middle" fill="#5f5e5a">fine-</text>
<text class="ts" x="421" y="113" text-anchor="middle" fill="#5f5e5a">tune</text>

<g class="c-teal">
  <rect x="442" y="40" width="200" height="120" rx="8"/>
  <text class="th" x="542" y="65" text-anchor="middle" dominant-baseline="central">AbserneyVision head</text>
  <text class="ts" x="542" y="83" text-anchor="middle" dominant-baseline="central">GlobalAvgPool</text>
  <text class="ts" x="542" y="101" text-anchor="middle" dominant-baseline="central">Dense 128 · ReLU · Dropout</text>
  <text class="ts" x="542" y="119" text-anchor="middle" dominant-baseline="central">Dense 13 · Softmax</text>
  <text class="ts" x="542" y="137" text-anchor="middle" dominant-baseline="central">13 COCO classes</text>
</g>

<text class="ts" x="340" y="210" text-anchor="middle" fill="#5f5e5a">Figure 2.3 — Transfer learning: ImageNet pretrained MobileNetV2 → AbserneyVision (13-class)</text>
</svg>
