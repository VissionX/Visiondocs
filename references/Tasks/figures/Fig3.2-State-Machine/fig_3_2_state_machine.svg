<svg width="700" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;font-weight:500;}
    .ts{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;}
    .c-gray  rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5;} .c-gray  .th{fill:#2c2c2a;} .c-gray  .ts{fill:#5f5e5a;}
    .c-teal  rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5;} .c-teal  .th{fill:#085041;} .c-teal  .ts{fill:#0f6e56;}
    .c-blue  rect{fill:#e6f1fb;stroke:#185fa5;stroke-width:0.5;} .c-blue  .th{fill:#0c447c;} .c-blue  .ts{fill:#185fa5;}
    .c-amber rect{fill:#faeeda;stroke:#854f0b;stroke-width:0.5;} .c-amber .th{fill:#633806;} .c-amber .ts{fill:#854f0b;}
    .c-red   rect{fill:#fcebeb;stroke:#a32d2d;stroke-width:0.5;} .c-red   .th{fill:#791f1f;} .c-red   .ts{fill:#a32d2d;}
    .c-green rect{fill:#eaf3de;stroke:#3b6d11;stroke-width:0.5;} .c-green .th{fill:#27500a;} .c-green .ts{fill:#3b6d11;}
  </style>
</defs>
<g class="c-gray"><rect x="270" y="20" width="140" height="44" rx="8"/>
<text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">BOOT</text></g>
<line x1="340" y1="64" x2="340" y2="90" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-teal"><rect x="245" y="92" width="190" height="56" rx="8"/>
<text class="th" x="340" y="113" text-anchor="middle" dominant-baseline="central">READY</text>
<text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">Pulse ring · awaiting gesture</text></g>
<line x1="245" y1="120" x2="185" y2="120" stroke="#888780" stroke-width="1.5"/>
<line x1="185" y1="120" x2="185" y2="195" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="182" y="160" text-anchor="end" fill="#5f5e5a">double tap</text>
<g class="c-blue"><rect x="60" y="197" width="190" height="56" rx="8"/>
<text class="th" x="155" y="218" text-anchor="middle" dominant-baseline="central">SCANNING</text>
<text class="ts" x="155" y="237" text-anchor="middle" dominant-baseline="central">Scan line · API request</text></g>
<line x1="250" y1="225" x2="290" y2="225" stroke="#888780" stroke-width="1.5"/>
<line x1="290" y1="225" x2="290" y2="254" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="293" y="243" text-anchor="start" fill="#5f5e5a">result</text>
<line x1="155" y1="253" x2="155" y2="290" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="158" y="275" text-anchor="start" fill="#5f5e5a">timeout/fail</text>
<g class="c-amber"><rect x="245" y="256" width="190" height="56" rx="8"/>
<text class="th" x="340" y="277" text-anchor="middle" dominant-baseline="central">SPEAKING</text>
<text class="ts" x="340" y="296" text-anchor="middle" dominant-baseline="central">TTS · result displayed</text></g>
<line x1="435" y1="284" x2="490" y2="284" stroke="#888780" stroke-width="1.5"/>
<line x1="490" y1="284" x2="490" y2="120" stroke="#888780" stroke-width="1.5"/>
<line x1="490" y1="120" x2="435" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="493" y="205" text-anchor="start" fill="#5f5e5a">done</text>
<g class="c-red"><rect x="60" y="292" width="190" height="44" rx="8"/>
<text class="th" x="155" y="314" text-anchor="middle" dominant-baseline="central">ERROR</text></g>
<line x1="60" y1="314" x2="30" y2="314" stroke="#888780" stroke-width="1.5"/>
<line x1="30" y1="314" x2="30" y2="120" stroke="#888780" stroke-width="1.5"/>
<line x1="30" y1="120" x2="245" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text class="ts" x="33" y="205" text-anchor="start" fill="#5f5e5a">1.8s</text>
<g class="c-green"><rect x="490" y="170" width="166" height="56" rx="8"/>
<text class="th" x="573" y="191" text-anchor="middle" dominant-baseline="central">WATCH</text>
<text class="ts" x="573" y="210" text-anchor="middle" dominant-baseline="central">Parallel · swipe-up toggle</text></g>
<line x1="435" y1="120" x2="573" y2="120" stroke="#639922" stroke-width="1" stroke-dasharray="5 4"/>
<line x1="573" y1="120" x2="573" y2="168" stroke="#639922" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr)"/>
<text class="ts" x="510" y="112" text-anchor="middle" fill="#3b6d11">swipe up</text>
<text class="ts" x="340" y="348" text-anchor="middle" fill="#5f5e5a">Figure 3.2 — Application state machine: states, guard conditions, and transitions</text>
</svg>
