<svg width="700" viewBox="0 0 680 310" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:14px; font-weight:500; }
    .ts { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size:12px; }
    .c-gray  rect { fill:#f1efe8; stroke:#5f5e5a; stroke-width:0.5; }
    .c-blue  rect { fill:#e6f1fb; stroke:#185fa5; stroke-width:0.5; }
    .c-teal  rect { fill:#e1f5ee; stroke:#0f6e56; stroke-width:0.5; }
    .c-amber rect { fill:#faeeda; stroke:#854f0b; stroke-width:0.5; }
    .c-coral rect { fill:#faece7; stroke:#993c1d; stroke-width:0.5; }
    .c-gray  .th  { fill:#2c2c2a; } .c-gray  .ts { fill:#5f5e5a; }
    .c-blue  .th  { fill:#0c447c; } .c-blue  .ts { fill:#185fa5; }
    .c-teal  .th  { fill:#085041; } .c-teal  .ts { fill:#0f6e56; }
    .c-amber .th  { fill:#633806; } .c-amber .ts { fill:#854f0b; }
    .c-coral .th  { fill:#712b13; } .c-coral .ts { fill:#993c1d; }
  </style>
</defs>

<!-- Centre: WCAG 2.1 -->
<g class="c-gray">
  <rect x="255" y="110" width="170" height="56" rx="8"/>
  <text class="th" x="340" y="131" text-anchor="middle" dominant-baseline="central">WCAG 2.1</text>
  <text class="ts" x="340" y="151" text-anchor="middle" dominant-baseline="central">Levels A · AA · AAA</text>
</g>

<!-- Perceivable -->
<g class="c-blue">
  <rect x="30" y="20" width="170" height="80" rx="8"/>
  <text class="th" x="115" y="48" text-anchor="middle" dominant-baseline="central">Perceivable</text>
  <text class="ts" x="115" y="66" text-anchor="middle" dominant-baseline="central">All info has audio alt.</text>
  <text class="ts" x="115" y="82" text-anchor="middle" dominant-baseline="central">No color-only signals</text>
</g>
<line x1="200" y1="80" x2="255" y2="125" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Operable -->
<g class="c-teal">
  <rect x="30" y="170" width="170" height="80" rx="8"/>
  <text class="th" x="115" y="198" text-anchor="middle" dominant-baseline="central">Operable</text>
  <text class="ts" x="115" y="216" text-anchor="middle" dominant-baseline="central">Full-screen gestures</text>
  <text class="ts" x="115" y="232" text-anchor="middle" dominant-baseline="central">Single-pointer only</text>
</g>
<line x1="200" y1="195" x2="255" y2="155" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Understandable -->
<g class="c-amber">
  <rect x="480" y="20" width="170" height="80" rx="8"/>
  <text class="th" x="565" y="48" text-anchor="middle" dominant-baseline="central">Understandable</text>
  <text class="ts" x="565" y="66" text-anchor="middle" dominant-baseline="central">en-US / ar-SA TTS lang</text>
  <text class="ts" x="565" y="82" text-anchor="middle" dominant-baseline="central">Spoken error messages</text>
</g>
<line x1="480" y1="80" x2="425" y2="125" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Robust -->
<g class="c-coral">
  <rect x="480" y="170" width="170" height="80" rx="8"/>
  <text class="th" x="565" y="198" text-anchor="middle" dominant-baseline="central">Robust</text>
  <text class="ts" x="565" y="216" text-anchor="middle" dominant-baseline="central">TalkBack compatible</text>
  <text class="ts" x="565" y="232" text-anchor="middle" dominant-baseline="central">accessibilityLabel attrs</text>
</g>
<line x1="480" y1="195" x2="425" y2="155" fill="none" stroke="#888780" stroke-width="1" marker-end="url(#arr)"/>

<!-- Level badges -->
<g class="c-teal"><rect x="120" y="268" width="60" height="22" rx="4"/>
<text class="ts" x="150" y="279" text-anchor="middle" dominant-baseline="central">Level A</text></g>
<g class="c-blue"><rect x="200" y="268" width="70" height="22" rx="4"/>
<text class="ts" x="235" y="279" text-anchor="middle" dominant-baseline="central">Level AA</text></g>
<g class="c-gray"><rect x="290" y="268" width="80" height="22" rx="4"/>
<text class="ts" x="330" y="279" text-anchor="middle" dominant-baseline="central">Level AAA</text></g>
<text class="ts" x="90" y="279" text-anchor="middle" dominant-baseline="central" fill="#5f5e5a">Conformance:</text>

<text class="ts" x="340" y="298" text-anchor="middle" fill="#5f5e5a">Figure 2.5 — WCAG 2.1 four-principle (POUR) framework and Abserny compliance mapping</text>
</svg>
