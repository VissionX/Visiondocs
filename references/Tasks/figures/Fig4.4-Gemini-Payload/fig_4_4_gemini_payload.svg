<svg width="700" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-family:-apple-system,sans-serif;font-size:14px;font-weight:500;}
    .ts{font-family:-apple-system,sans-serif;font-size:12px;}
    .c-gray  rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5;} .c-gray  .th{fill:#2c2c2a;} .c-gray .ts{fill:#5f5e5a;}
    .c-blue  rect{fill:#e6f1fb;stroke:#185fa5;stroke-width:0.5;} .c-blue  .th{fill:#0c447c;} .c-blue .ts{fill:#185fa5;}
    .c-amber rect{fill:#faeeda;stroke:#854f0b;stroke-width:0.5;} .c-amber .th{fill:#633806;} .c-amber .ts{fill:#854f0b;}
    .c-teal  rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5;} .c-teal  .th{fill:#085041;} .c-teal .ts{fill:#0f6e56;}
  </style>
</defs>
<g class="c-gray"><rect x="20" y="80" width="120" height="80" rx="8"/>
<text class="th" x="80" y="107" text-anchor="middle" dominant-baseline="central">Camera frame</text>
<text class="ts" x="80" y="125" text-anchor="middle" dominant-baseline="central">JPEG 25%</text>
<text class="ts" x="80" y="141" text-anchor="middle" dominant-baseline="central">~50&#x2013;110 KB</text></g>
<line x1="140" y1="120" x2="162" y2="120" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
