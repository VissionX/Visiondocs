<text class="th" x="219" y="112" text-anchor="middle" dominant-baseline="central">Base64</text>
<text class="ts" x="219" y="130" text-anchor="middle" dominant-baseline="central">inline_data</text>
<text class="ts" x="219" y="146" text-anchor="middle" dominant-baseline="central">image/jpeg</text></g>
<g class="c-amber"><rect x="20" y="180" width="120" height="60" rx="8"/>
