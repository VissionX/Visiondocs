<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="340" y="258" text-anchor="middle">Figure 4.4 &#x2014; Gemini API request structure: image + mode prompt &#x2192; generationConfig &#x2192; response</text>
