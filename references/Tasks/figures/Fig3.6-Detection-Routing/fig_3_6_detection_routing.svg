<text font-family="-apple-system,sans-serif" font-size="12" fill="#5f5e5a" x="340" y="212" text-anchor="middle" dominant-baseline="central">mode?</text>
<line x1="260" y1="200" x2="180" y2="200" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="220" y="192" text-anchor="middle">Yes</text>
