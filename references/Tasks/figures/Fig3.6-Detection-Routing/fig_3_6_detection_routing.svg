<svg width="700" viewBox="0 0 680 400" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    .th{font-family:-apple-system,sans-serif;font-size:14px;font-weight:500;}
    .ts{font-family:-apple-system,sans-serif;font-size:12px;}
    .c-gray  rect{fill:#f1efe8;stroke:#5f5e5a;stroke-width:0.5;} .c-gray  .th{fill:#2c2c2a;} .c-gray .ts{fill:#5f5e5a;}
    .c-teal  rect{fill:#e1f5ee;stroke:#0f6e56;stroke-width:0.5;} .c-teal  .th{fill:#085041;} .c-teal .ts{fill:#0f6e56;}
    .c-amber rect{fill:#faeeda;stroke:#854f0b;stroke-width:0.5;} .c-amber .th{fill:#633806;} .c-amber .ts{fill:#854f0b;}
  </style>
</defs>
<g class="c-gray"><rect x="270" y="20" width="140" height="40" rx="20"/>
<text class="th" x="340" y="40" text-anchor="middle" dominant-baseline="central">detect() called</text></g>
