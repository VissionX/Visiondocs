<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="346" y="246" text-anchor="start">No</text>
<g class="c-amber"><rect x="240" y="260" width="200" height="44" rx="6"/>
<text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">ML Kit Image Labeling</text>
<text class="ts" x="340" y="295" text-anchor="middle" dominant-baseline="central">Top-6 confidence labels</text></g>
<line x1="340" y1="304" x2="340" y2="330" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="119" y1="222" x2="119" y2="342" stroke="#888780" stroke-width="1.5"/>
<line x1="119" y1="342" x2="270" y2="342" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
<g class="c-amber"><rect x="272" y="330" width="136" height="36" rx="6"/>
<text class="th" x="340" y="348" text-anchor="middle" dominant-baseline="central">{result, "offline"}</text></g>
<text font-family="-apple-system,sans-serif" font-size="12" fill="#888780" x="340" y="388" text-anchor="middle">Figure 3.6 &#x2014; Online vs. offline detection routing decision flow</text>
